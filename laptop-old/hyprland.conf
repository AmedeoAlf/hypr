autogenerated = 0 # remove this line to remove the warning

source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/wmcustomization.conf
source = ~/.config/hypr/kbmouse.conf

###############
### MONITOR ###
###############

# https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1.25

xwayland {
  force_zero_scaling = true
}

windowrule = match:title ^(Hollow Knight)$, immediate on


###################
### MY PROGRAMS ###
###################

$terminal = foot
$fileManager = dolphin
$menu = hyprlauncher
exec-once = hyprlauncher -d

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER
source = ~/.config/hypr/wmbinds.conf
source = ~/.config/hypr/appbinds.conf
